<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Export oazyse° Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }
    .preview {
      background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;
      padding: 40px 80px;
      border-radius: 12px;
      margin: 20px 0;
    }
    .logo {
      font-family: 'Questrial', sans-serif;
      font-size: 160px;
      font-weight: 400;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #ab4dff 0%, #00e673 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .controls {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 12px;
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }
    input {
      background: #111;
      border: 1px solid #444;
      color: white;
      padding: 10px;
      font-size: 18px;
      border-radius: 6px;
      width: 120px;
    }
    canvas {
      display: none;
    }
    button {
      background: linear-gradient(90deg, #ab4dff, #00e673);
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .info {
      color: #888;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>oazyse° Logo Generator (Тримминг)</h1>
  <div class="preview">
    <div class="logo" id="logo">oazyse°</div>
  </div>
  
  <div class="controls">
    <label>Ширина текста (px):</label>
    <input type="number" id="widthInput" value="4000" min="500" max="10000" />
    <button onclick="downloadPNG()">Скачать плотный PNG (без полей)</button>
  </div>
  
  <canvas id="canvas"></canvas>
  <p class="info">PNG обрезается точно по краям текста (идеально для Figma).</p>

  <script>
    async function downloadPNG() {
      // Wait for font to load
      await document.fonts.ready;

      const targetWidth = parseInt(document.getElementById('widthInput').value, 10);
      const fontSize = Math.floor(targetWidth * 0.35); // Initial guess

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      // Setup font to measure
      ctx.font = `${fontSize}px Questrial`;
      const metrics = ctx.measureText('oazyse°');
      
      // Calculate exact text dimensions
      const textWidth = Math.ceil(metrics.actualBoundingBoxRight + metrics.actualBoundingBoxLeft);
      const textHeight = Math.ceil(metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent);
      
      // Calculate scale factor to match target width exactly
      const scale = targetWidth / textWidth;
      const finalFontSize = Math.floor(fontSize * scale);
      
      // Setup context again with exact font size
      ctx.font = `${finalFontSize}px Questrial`;
      const finalMetrics = ctx.measureText('oazyse°');
      const exactWidth = Math.ceil(finalMetrics.actualBoundingBoxRight + finalMetrics.actualBoundingBoxLeft);
      const exactHeight = Math.ceil(finalMetrics.actualBoundingBoxAscent + finalMetrics.actualBoundingBoxDescent);
      
      // Set canvas to EXACT dimensions (no padding)
      canvas.width = exactWidth;
      canvas.height = exactHeight;
      
      // Clear canvas (transparent)
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Setup font
      ctx.font = `${finalFontSize}px Questrial`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic'; // Easier for precise Y positioning
      
      // Create gradient matching the text width
      const gradient = ctx.createLinearGradient(0, 0, exactWidth, 0);
      gradient.addColorStop(0, '#ab4dff');
      gradient.addColorStop(1, '#00e673');
      
      // Draw text exactly at the calculated offset so it touches the top-left edge
      ctx.fillStyle = gradient;
      const x = finalMetrics.actualBoundingBoxLeft;
      // We align using alphabetic baseline, so Y needs to be shifted down by Ascent
      const y = finalMetrics.actualBoundingBoxAscent;
      
      ctx.fillText('oazyse°', x, y);
      
      // Download
      const link = document.createElement('a');
      link.download = `oazyse-logo-tight-${exactWidth}x${exactHeight}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
