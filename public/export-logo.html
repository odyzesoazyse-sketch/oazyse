<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Export oazyse° Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }
    .preview {
      background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;
      padding: 40px 80px;
      border-radius: 12px;
      margin: 20px 0;
    }
    .logo {
      font-family: 'Questrial', sans-serif;
      font-size: 160px;
      font-weight: 400;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #ab4dff 0%, #00e673 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .controls {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 12px;
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }
    input {
      background: #111;
      border: 1px solid #444;
      color: white;
      padding: 10px;
      font-size: 18px;
      border-radius: 6px;
      width: 120px;
    }
    canvas {
      display: none;
    }
    button {
      background: linear-gradient(90deg, #ab4dff, #00e673);
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .info {
      color: #888;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>oazyse° Logo Generator</h1>
  <div class="preview">
    <div class="logo" id="logo">oazyse°</div>
  </div>
  
  <div class="controls">
    <label>Ширина (px):</label>
    <input type="number" id="widthInput" value="4000" min="500" max="10000" />
    <button onclick="downloadPNG()">Скачать прозрачный PNG</button>
  </div>
  
  <canvas id="canvas"></canvas>
  <p class="info">PNG с прозрачным фоном, шрифт Questrial, неон-градиент. Идеально для Figma!</p>

  <script>
    async function downloadPNG() {
      const width = parseInt(document.getElementById('widthInput').value, 10);
      const height = Math.floor(width / 4); // maintain 4:1 aspect ratio
      
      const canvas = document.getElementById('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      
      // Clear canvas (transparent)
      ctx.clearRect(0, 0, width, height);
      
      // Wait for font to load
      await document.fonts.ready;
      
      // Create gradient (20% padding on sides)
      const gradient = ctx.createLinearGradient(width * 0.2, 0, width * 0.8, 0);
      gradient.addColorStop(0, '#ab4dff');
      gradient.addColorStop(1, '#00e673');
      
      // Draw text
      const fontSize = Math.floor(width * 0.15); // Scale font to width
      ctx.font = `${fontSize}px Questrial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = gradient;
      // letter-spacing isn't natively supported in fillText reliably, but Questrial is wide enough.
      ctx.fillText('oazyse°', width / 2, height / 2 + (fontSize * 0.05));
      
      // Download
      const link = document.createElement('a');
      link.download = `oazyse-logo-${width}px.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
