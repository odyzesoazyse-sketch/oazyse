<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Export oazyse° Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }
    .preview {
      background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;
      padding: 40px 80px;
      border-radius: 12px;
      margin: 20px 0;
    }
    .logo {
      font-family: 'Questrial', sans-serif;
      font-size: 160px;
      font-weight: 400;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #ab4dff 0%, #00e673 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .controls {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 600px;
    }
    .row {
      display: flex;
      gap: 15px;
      align-items: center;
      width: 100%;
      justify-content: center;
    }
    input {
      background: #111;
      border: 1px solid #444;
      color: white;
      padding: 10px;
      font-size: 18px;
      border-radius: 6px;
      width: 120px;
    }
    canvas {
      display: none;
    }
    button {
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
    }
    .btn-1 {
      background: linear-gradient(90deg, #444, #666);
    }
    .btn-2 {
      background: linear-gradient(90deg, #ab4dff, #00e673);
    }
    button:hover {
      opacity: 0.9;
    }
    .info {
      color: #888;
      margin-top: 20px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>oazyse° Logo Generator</h1>
  <div class="preview">
    <div class="logo" id="logo">oazyse°</div>
  </div>
  
  <div class="controls">
    <div class="row">
      <label>Ширина текста (px):</label>
      <input type="number" id="widthInput" value="4000" min="500" max="10000" />
    </div>
    <div class="row">
      <button class="btn-1" onclick="downloadPNG('tight')">1. Точный обрез (Без полей)</button>
      <button class="btn-2" onclick="downloadPNG('centered')">2. Слово "oazyse" по центру</button>
    </div>
  </div>
  
  <canvas id="canvas"></canvas>
  <p class="info">
    <b>Вариант 1:</b> Логотип обрезан строго по краям (впритык).<br>
    <b>Вариант 2 (Идеальный):</b> Слева добавляется пустое пространство, равное ширине значка градуса (°). Благодаря этому слово <b>oazyse</b> встает математически ровно по центру холста!
  </p>

  <script>
    async function downloadPNG(mode) {
      await document.fonts.ready;

      const targetWidth = parseInt(document.getElementById('widthInput').value, 10);
      const fontSize = Math.floor(targetWidth * 0.35);

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      // Setup font to measure
      ctx.font = `${fontSize}px Questrial`;
      
      // Measure full text "oazyse°"
      const metricsFull = ctx.measureText('oazyse°');
      const fullWidth = Math.ceil(metricsFull.actualBoundingBoxRight + metricsFull.actualBoundingBoxLeft);
      const textHeight = Math.ceil(metricsFull.actualBoundingBoxAscent + metricsFull.actualBoundingBoxDescent);
      
      // Measure just "oazyse" to find the width of the degree symbol
      const metricsBase = ctx.measureText('oazyse');
      const baseWidth = Math.ceil(metricsBase.actualBoundingBoxRight + metricsBase.actualBoundingBoxLeft);
      
      // The width of the "°" symbol (including its spacing from the "e")
      const degreeWidth = fullWidth - baseWidth;

      // Scale factor
      const scale = targetWidth / fullWidth;
      const finalFontSize = Math.floor(fontSize * scale);
      
      // Re-measure with final font size
      ctx.font = `${finalFontSize}px Questrial`;
      const fFull = ctx.measureText('oazyse°');
      const fBase = ctx.measureText('oazyse');
      
      const exactFullWidth = Math.ceil(fFull.actualBoundingBoxRight + fFull.actualBoundingBoxLeft);
      const exactHeight = Math.ceil(fFull.actualBoundingBoxAscent + fFull.actualBoundingBoxDescent);
      const exactBaseWidth = Math.ceil(fBase.actualBoundingBoxRight + fBase.actualBoundingBoxLeft);
      const exactDegreeWidth = exactFullWidth - exactBaseWidth;

      let canvasWidth = exactFullWidth;
      let xOffset = fFull.actualBoundingBoxLeft;
      
      if (mode === 'centered') {
        // Add left padding equal to the degree symbol width so "oazyse" is perfectly centered
        canvasWidth = exactFullWidth + exactDegreeWidth;
        xOffset = fFull.actualBoundingBoxLeft + exactDegreeWidth;
      }

      // Set canvas to calculated dimensions
      canvas.width = canvasWidth;
      canvas.height = exactHeight;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.font = `${finalFontSize}px Questrial`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      
      // Create gradient matching the text width (not the whole canvas if padded)
      const gradient = ctx.createLinearGradient(xOffset, 0, xOffset + exactFullWidth, 0);
      gradient.addColorStop(0, '#ab4dff');
      gradient.addColorStop(1, '#00e673');
      
      ctx.fillStyle = gradient;
      
      const yOffset = fFull.actualBoundingBoxAscent;
      ctx.fillText('oazyse°', xOffset, yOffset);
      
      const link = document.createElement('a');
      link.download = `oazyse-logo-${mode}-${canvasWidth}x${exactHeight}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
